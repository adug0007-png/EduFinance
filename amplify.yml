version: 1
frontend:
  phases:
    preBuild:
      commands:
        # install & use Node 20.19.x
        - export NVM_DIR="$HOME/.nvm"
        - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
        - . "$NVM_DIR/nvm.sh"
        - nvm install 20.19.0
        - nvm use 20.19.0
        - node -v && npm -v
        - npm ci || npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
